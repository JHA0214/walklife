<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>워크라이프 · 낙상예방 운동가이드</title>
  <link rel="stylesheet" href="css/styles.css" />

  <!-- 홈 화면 바로가기 (PWA 설치) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1f7a5a" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="워크라이프" />
</head>
<body>
  <!-- 모바일 기기 프레임 -->
  <div class="device-frame">
    <div class="device-notch"></div>
    <!-- 실제 화면 (스크롤 영역) -->
    <div class="phone-screen">
  <!-- 상단 헤더 -->
  <header class="app-header">
    <button id="btnHome" class="brand" aria-label="처음으로">
      <span class="brand-mark">🚶</span>
      <span class="brand-name">워크라이프</span>
    </button>
    <div class="header-actions">
      <button id="btnSettings" class="icon-btn" aria-label="설정">
        <span aria-hidden="true">⚙️</span><span class="icon-btn-label">설정</span>
      </button>
      <button id="btnUserLogin" class="admin-login-btn" aria-label="로그인" data-mode="login">로그인</button>
    </div>
  </header>

  <!-- 관리자 상태 배너 -->
  <div id="adminBanner" class="admin-banner" hidden>
    <span>🔑 관리자 모드로 보고 있습니다.</span>
    <div class="admin-banner-actions">
      <button id="btnGoAdmin" class="btn btn-small">관리자 페이지</button>
      <button id="btnLogout" class="btn btn-small btn-ghost">로그아웃</button>
    </div>
  </div>

  <!-- 화면이 이 곳에 렌더링됩니다 -->
  <main id="view" class="view"></main>

  <footer class="app-footer">
    <p>워크라이프 · 만 65세 이상 어르신을 위한 낙상예방 운동 가이드</p>
  </footer>
    </div><!-- /.phone-screen -->

    <!-- 모달 (관리자 로그인 등) — 기기 화면 안쪽에 표시 -->
    <div id="modalOverlay" class="modal-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle" class="modal-title"></h2>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>
  </div><!-- /.device-frame -->

  <script type="module" src="js/main.js"></script>
</body>
</html>
